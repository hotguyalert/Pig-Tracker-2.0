<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="only light">
<title>🐷 Tampa Pig Toss Tracker</title>
<style>
  :root {
    color-scheme: only light;
    --blue: #1565c0;
    --blue-light: #1e88e5;
    --blue-dark: #0d47a1;
    --blue-pale: #e3f0ff;
    --black: #0f0f0f;
    --dark: #1a1a2e;
    --white: #ffffff;
    --radius: 20px;
    --font-display: 'Arial Black', 'Arial Bold', Gadget, sans-serif;
    --font-body: 'Arial Rounded MT Bold', 'Arial', sans-serif;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: var(–font-body);
min-height: 100vh;
padding: 20px;
color: var(–dark);
background-color: #ddeeff;
}

#bg-canvas {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
z-index: 0;
}

body > *:not(#bg-canvas) {
position: relative;
z-index: 1;
}

h1 {
font-family: var(–font-display);
font-size: clamp(1.8rem, 6vw, 3.2rem);
font-weight: 900;
text-align: center;
color: var(–blue-dark);
text-shadow: 3px 3px 0 #90b8e8, 5px 5px 0 rgba(21,101,192,0.15);
margin-bottom: 6px;
letter-spacing: 1px;
text-transform: uppercase;
}

.subtitle {
text-align: center;
color: #1a3a6e;
font-weight: 700;
margin-bottom: 28px;
font-size: 1rem;
font-family: var(–font-body);
}

.add-bar {
display: flex;
gap: 10px;
max-width: 480px;
margin: 0 auto 32px;
}

.add-bar input {
flex: 1;
padding: 14px 18px;
border-radius: 50px;
border: 2px solid #90b8e8;
font-family: var(–font-body);
font-size: 1rem;
font-weight: 700;
background: var(–white) !important;
outline: none;
color: var(–dark) !important;
transition: border-color .2s;
-webkit-appearance: none;
appearance: none;
}
.add-bar input::placeholder { color: #90b8e8; }
.add-bar input:focus { border-color: var(–blue); }

.btn, .score-btn, .remove-btn {
-webkit-appearance: none;
appearance: none;
display: inline-flex;
align-items: center;
justify-content: center;
}

.btn {
padding: 14px 22px;
border-radius: 50px;
border: none;
font-family: var(–font-body);
font-weight: 800;
font-size: .95rem;
cursor: pointer;
transition: transform .1s, box-shadow .1s;
}
.btn:active { transform: scale(.96); }

.btn-add {
background: var(–blue) !important;
color: var(–white) !important;
box-shadow: 0 4px 0 var(–blue-dark);
}
.btn-add:active { box-shadow: 0 1px 0 var(–blue-dark); transform: translateY(3px); }

#players {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 20px;
max-width: 1100px;
margin: 0 auto 30px;
}

.player-card {
background: rgba(255,255,255,0.94) !important;
backdrop-filter: blur(4px);
border-radius: var(–radius);
padding: 22px 22px 18px;
box-shadow: 0 6px 0 #90b8e8, 0 10px 30px rgba(21,101,192,.13);
position: relative;
animation: popIn .35s cubic-bezier(.34,1.56,.64,1) both;
}

@keyframes popIn {
from { opacity:0; transform:scale(.7) translateY(20px); }
to   { opacity:1; transform:scale(1) translateY(0); }
}

.player-header {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 16px;
}

.pig-avatar {
width: 48px; height: 48px;
border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-size: 1.6rem;
flex-shrink: 0;
box-shadow: 0 3px 0 rgba(0,0,0,.10);
}

.player-name {
font-family: var(–font-display);
font-size: 1.15rem;
font-weight: 900;
color: var(–dark);
flex: 1;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
text-transform: uppercase;
letter-spacing: .5px;
}

.remove-btn {
background: none !important;
border: none;
cursor: pointer;
color: #90b8e8 !important;
font-size: 1.1rem;
line-height: 1;
padding: 4px;
border-radius: 50%;
transition: color .2s, background .2s;
}
.remove-btn:hover { color: var(–blue-dark) !important; background: var(–blue-pale) !important; }

.score-display {
text-align: center;
margin-bottom: 10px;
}

.score-number {
font-family: var(–font-display);
font-size: 4.5rem;
font-weight: 900;
line-height: 1;
color: var(–blue) !important;
cursor: pointer;
border-radius: 12px;
padding: 4px 10px;
display: inline-block;
transition: background .2s;
}
.score-number:hover { background: var(–blue-pale); }

.score-number.bump {
animation: bump .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes bump {
0%   { transform: scale(1); }
50%  { transform: scale(1.35); }
100% { transform: scale(1); }
}

.score-edit-input {
font-family: var(–font-display);
font-size: 3.5rem;
font-weight: 900;
line-height: 1;
color: var(–blue);
text-align: center;
width: 140px;
border: 3px solid var(–blue);
border-radius: 12px;
padding: 4px 10px;
outline: none;
background: var(–blue-pale);
box-shadow: 0 0 0 4px rgba(21,101,192,.12);
-webkit-appearance: none;
appearance: none;
}

.score-label {
font-size: .75rem;
font-weight: 800;
color: #4a7ab5;
text-transform: uppercase;
letter-spacing: 2px;
margin-top: 2px;
font-family: var(–font-body);
}

.edit-hint {
font-size: .7rem;
color: #90b8e8;
font-weight: 600;
margin-top: 2px;
font-family: var(–font-body);
}

.turn-points {
text-align: center;
font-size: .85rem;
font-weight: 800;
color: var(–blue-light);
min-height: 20px;
margin-bottom: 10px;
font-family: var(–font-body);
}

.score-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 7px;
margin-bottom: 10px;
}

.score-btn {
border: none;
border-radius: 12px;
padding: 8px 4px;
font-family: var(–font-body);
font-weight: 800;
font-size: .78rem;
cursor: pointer;
transition: transform .1s, filter .1s;
line-height: 1.2;
text-align: center;
}
.score-btn:active { transform: scale(.93); filter: brightness(.9); }
.score-btn .pts { display: block; font-size: 1.05rem; font-weight: 900; }

.s1  { background:#e3f0ff !important; color:#0d47a1 !important; box-shadow:0 3px 0 #90b8e8; }
.s5  { background:#e8edf5 !important; color:#1a1a2e !important; box-shadow:0 3px 0 #b0bcd0; }
.s10 { background:#1565c0 !important; color:#ffffff !important; box-shadow:0 3px 0 #0d47a1; }
.s15 { background:#0d47a1 !important; color:#ffffff !important; box-shadow:0 3px 0 #082f6e; }
.s20 { background:#0f0f0f !important; color:#ffffff !important; box-shadow:0 3px 0 #000000; }
.sog { background:#1e88e5 !important; color:#ffffff !important; box-shadow:0 3px 0 #1565c0; }
.score-btn:active { box-shadow: none !important; transform: translateY(3px) scale(.97); }

.card-actions {
display: flex;
gap: 7px;
}

.btn-undo {
flex: 1;
background: #e8edf5 !important;
color: #555 !important;
box-shadow: 0 3px 0 #b0bcd0;
font-size: .82rem;
font-family: var(–font-body);
font-weight: 800;
}
.btn-undo:active { box-shadow: none; transform: translateY(3px); }

.btn-bank {
flex: 1;
background: var(–blue) !important;
color: var(–white) !important;
box-shadow: 0 3px 0 var(–blue-dark);
font-size: .82rem;
font-family: var(–font-body);
font-weight: 800;
}
.btn-bank:active { box-shadow: none; transform: translateY(3px); }

.btn-pig {
flex: 1;
background: var(–black) !important;
color: var(–white) !important;
box-shadow: 0 3px 0 #000;
font-size: .82rem;
font-family: var(–font-body);
font-weight: 800;
}
.btn-pig:active { box-shadow: none; transform: translateY(3px); }

.winner-banner {
display: none;
text-align: center;
background: linear-gradient(135deg, var(–blue), var(–blue-dark)) !important;
border-radius: var(–radius);
padding: 24px;
max-width: 480px;
margin: 0 auto 28px;
box-shadow: 0 8px 0 #082f6e, 0 14px 40px rgba(21,101,192,.35);
animation: popIn .4s cubic-bezier(.34,1.56,.64,1) both;
}

.winner-banner h2 {
font-family: var(–font-display);
font-size: 2rem;
font-weight: 900;
color: var(–white) !important;
text-shadow: 2px 2px 0 rgba(0,0,0,.25);
margin-bottom: 4px;
text-transform: uppercase;
}

.winner-banner p {
color: rgba(255,255,255,.9) !important;
font-weight: 700;
font-size: 1rem;
font-family: var(–font-body);
}

.footer {
text-align: center;
margin-top: 10px;
}

.btn-reset {
background: var(–white) !important;
color: var(–blue-dark) !important;
border: 2px solid #90b8e8 !important;
padding: 12px 28px;
font-size: .95rem;
font-family: var(–font-body);
font-weight: 800;
}
.btn-reset:hover { background: var(–blue-pale) !important; }

.history-line {
font-size: .72rem;
color: #4a7ab5;
font-weight: 700;
text-align: center;
min-height: 16px;
margin-top: 4px;
font-family: var(–font-body);
}

.target-row {
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
max-width: 380px;
margin: 0 auto 24px;
}
.target-row label {
font-weight: 800;
color: #1a3a6e;
font-size: .9rem;
font-family: var(–font-body);
}
.target-row input {
width: 80px;
padding: 8px 12px;
border-radius: 50px;
border: 2px solid #90b8e8;
font-family: var(–font-body);
font-size: .95rem;
font-weight: 800;
text-align: center;
color: var(–dark);
outline: none;
background: var(–white) !important;
-webkit-appearance: none;
appearance: none;
}
.target-row input:focus { border-color: var(–blue); }

.card-winner {
outline: 4px solid var(–blue-dark);
outline-offset: 2px;
}
.card-winner .score-number { color: var(–black) !important; }
</style>

</head>
<body>

<canvas id="bg-canvas"></canvas>

<h1>🐷 Tampa Pig Toss</h1>
<p class="subtitle">Eat up lil' Piggies!</p>

<div id="winner-banner" class="winner-banner">
  <h2 id="winner-text">🎉 We have a winner!</h2>
  <p id="winner-sub"></p>
</div>

<div class="add-bar">
  <input type="text" id="name-input" placeholder="Player name…" maxlength="18" />
  <button class="btn btn-add" onclick="addPlayer()">+ Add</button>
</div>

<div class="target-row">
  <label for="target-input">🏁 Win target:</label>
  <input type="number" id="target-input" value="100" min="10" max="999" />
</div>

<div id="players"></div>

<div class="footer">
  <button class="btn btn-reset" onclick="resetGame()">🔄 New Game</button>
</div>

<script>
// ── Background canvas: pigs + lightning bolts ──────────────
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  const TILE = 120;

  function drawPattern() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const cols = Math.ceil(canvas.width / TILE) + 1;
    const rows = Math.ceil(canvas.height / TILE) + 1;

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const x = c * TILE;
        const y = r * TILE;

        ctx.globalAlpha = 0.13;
        ctx.font = '28px serif';
        ctx.fillStyle = '#000';
        ctx.fillText('🐷', x + 10, y + 40);

        ctx.globalAlpha = 0.10;
        ctx.font = '22px serif';
        ctx.fillText('🐷', x + 65, y + 85);

        ctx.globalAlpha = 0.22;
        ctx.fillStyle = '#0d47a1';
        ctx.font = 'bold 26px sans-serif';
        ctx.fillText('⚡', x + 55, y + 38);

        ctx.globalAlpha = 0.17;
        ctx.font = 'bold 22px sans-serif';
        ctx.fillText('⚡', x + 5, y + 95);
      }
    }
    ctx.globalAlpha = 1;
  }

  drawPattern();
  window.addEventListener('resize', drawPattern);
  window.addEventListener('scroll', drawPattern);
})();

// ── Game logic ─────────────────────────────────────────────
const COLORS = [
  { bg: '#e3f0ff', emoji: '🐷' },
  { bg: '#e8edf5', emoji: '🐽' },
  { bg: '#d0e8ff', emoji: '🐖' },
  { bg: '#c8d8f0', emoji: '🥓' },
  { bg: '#ddeeff', emoji: '🐷' },
  { bg: '#eef4ff', emoji: '🐽' },
];

let players = [];
let colorIdx = 0;

function getTarget() {
  return parseInt(document.getElementById('target-input').value) || 100;
}

function addPlayer() {
  const input = document.getElementById('name-input');
  const name = input.value.trim();
  if (!name) return;
  const color = COLORS[colorIdx % COLORS.length];
  colorIdx++;
  players.push({ name, score: 0, turnPoints: 0, scoreAtTurnStart: 0, history: [], color });
  input.value = '';
  renderPlayers();
  input.focus();
}

function renderPlayers() {
  const container = document.getElementById('players');
  container.innerHTML = '';

  const target = getTarget();
  const winner = players.find(p => p.score >= target);

  const banner = document.getElementById('winner-banner');
  if (winner) {
    banner.style.display = 'block';
    document.getElementById('winner-text').textContent = `🎉 ${winner.name} wins!`;
    document.getElementById('winner-sub').textContent = `Reached ${winner.score} points — oink oink! 🐷`;
  } else {
    banner.style.display = 'none';
  }

  players.forEach((p, idx) => {
    const card = document.createElement('div');
    card.className = 'player-card' + (p.score >= target ? ' card-winner' : '');
    card.id = `card-${idx}`;

    const shortHistory = p.history.slice(-5).map(h => `+${h}`).join(', ');
    const turnDisplay = p.turnPoints > 0 ? `This turn: +${p.turnPoints}` : '';

    card.innerHTML = `
      <div class="player-header">
        <div class="pig-avatar" style="background:${p.color.bg}">${p.color.emoji}</div>
        <span class="player-name">${p.name}</span>
        <button class="remove-btn" title="Remove player" onclick="removePlayer(${idx})">✕</button>
      </div>
      <div class="score-display">
        <div class="score-number" id="score-${idx}" onclick="startEdit(${idx})" title="Tap to edit">${p.score}</div>
        <div class="score-label">points</div>
        <div class="edit-hint">✏️ tap score to edit</div>
      </div>
      <div class="turn-points" id="turn-${idx}">${turnDisplay}</div>
      <div class="score-grid">
        <button class="score-btn s1"  onclick="addScore(${idx},1)"><span class="pts">+1</span>Sider</button>
        <button class="score-btn s5"  onclick="addScore(${idx},5)"><span class="pts">+5</span>Razorback</button>
        <button class="score-btn s5"  onclick="addScore(${idx},5)"><span class="pts">+5</span>Trotter</button>
        <button class="score-btn s10" onclick="addScore(${idx},10)"><span class="pts">+10</span>Snouter</button>
        <button class="score-btn s15" onclick="addScore(${idx},15)"><span class="pts">+15</span>L. Jowler</button>
        <button class="score-btn s20" onclick="addScore(${idx},20)"><span class="pts">+20</span>Dbl Rzrback</button>
        <button class="score-btn s20" onclick="addScore(${idx},20)"><span class="pts">+20</span>Dbl Trotter</button>
        <button class="score-btn sog" onclick="addScore(${idx},40)"><span class="pts">+40</span>Dbl Snouter</button>
        <button class="score-btn sog" onclick="pigOut(${idx})"><span class="pts">💀</span>Pig Out</button>
      </div>
      <div class="card-actions">
        <button class="btn btn-undo" onclick="undoTurn(${idx})">↩ Undo Turn</button>
        <button class="btn btn-bank" onclick="bankTurn(${idx})">✔ Bank</button>
        <button class="btn btn-pig" onclick="oinker(${idx})">🐷 Oinker</button>
      </div>
      <div class="history-line" id="hist-${idx}">${shortHistory ? '↑ ' + shortHistory : ''}</div>
    `;
    container.appendChild(card);
  });
}

function startEdit(idx) {
  const scoreEl = document.getElementById(`score-${idx}`);
  const currentScore = players[idx].score;

  const input = document.createElement('input');
  input.type = 'number';
  input.value = currentScore;
  input.className = 'score-edit-input';
  input.min = 0;
  input.max = 9999;

  scoreEl.replaceWith(input);
  input.focus();
  input.select();

  function commitEdit() {
    const newScore = parseInt(input.value);
    if (!isNaN(newScore) && newScore >= 0) {
      players[idx].score = newScore;
      players[idx].scoreAtTurnStart = newScore;
      players[idx].turnPoints = 0;
    }
    renderPlayers();
  }

  input.addEventListener('blur', commitEdit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { input.blur(); }
    if (e.key === 'Escape') { renderPlayers(); }
  });
}

function addScore(idx, pts) {
  const p = players[idx];
  p.turnPoints += pts;
  p.score += pts;
  renderPlayers();
  const el = document.getElementById(`score-${idx}`);
  if (el) {
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  }
}

function bankTurn(idx) {
  const p = players[idx];
  if (p.turnPoints === 0) return;
  p.history.push(p.turnPoints);
  p.scoreAtTurnStart = p.score;
  p.turnPoints = 0;
  renderPlayers();
}

function pigOut(idx) {
  const p = players[idx];
  p.score = p.scoreAtTurnStart;
  p.turnPoints = 0;
  p.history.push('PIG OUT');
  renderPlayers();
}

function oinker(idx) {
  const p = players[idx];
  p.score = 0;
  p.scoreAtTurnStart = 0;
  p.turnPoints = 0;
  p.history.push('OINKER');
  renderPlayers();
}

function undoTurn(idx) {
  const p = players[idx];
  if (p.turnPoints === 0) return;
  p.score = p.scoreAtTurnStart;
  p.turnPoints = 0;
  renderPlayers();
}

function removePlayer(idx) {
  players.splice(idx, 1);
  renderPlayers();
}

function resetGame() {
  if (players.length && !confirm('Start a new game? This will reset all scores.')) return;
  players.forEach(p => { p.score = 0; p.turnPoints = 0; p.scoreAtTurnStart = 0; p.history = []; });
  renderPlayers();
}

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addPlayer();
});

document.getElementById('target-input').addEventListener('input', renderPlayers);
</script>

</body>
</html>
